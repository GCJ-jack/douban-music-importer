<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Douban Music Importer</title>
    <link rel="stylesheet" href="./popup.css">
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>豆瓣音乐导入助手</h1>
        <p id="status" class="status">正在检测当前页面…</p>
      </header>

      <dl class="facts">
        <div>
          <dt>页面状态</dt>
          <dd id="page-support">检测中</dd>
        </div>
        <div>
          <dt>Release ID</dt>
          <dd id="release-id">-</dd>
        </div>
        <div>
          <dt>API 状态</dt>
          <dd id="api-status">未请求</dd>
        </div>
      </dl>

      <button id="import-button" type="button" disabled>获取 Discogs 元数据</button>

      <section class="result" aria-live="polite">
        <p id="result-message"></p>
      </section>

      <section id="draft-review" class="draft-review" hidden>
        <header class="review-header">
          <div>
            <h2>草稿预览</h2>
            <p>这是写入豆瓣前的草稿预览，不会自动发布或提交。</p>
          </div>
          <button id="clear-draft-button" class="secondary-button" type="button">清除</button>
        </header>

        <dl class="review-summary">
          <div>
            <dt>字段</dt>
            <dd id="draft-field-count">0</dd>
          </div>
          <div>
            <dt>已确认</dt>
            <dd id="draft-confirmed-count">0</dd>
          </div>
          <div>
            <dt>需复核</dt>
            <dd id="draft-review-count">0</dd>
          </div>
          <div>
            <dt>未映射</dt>
            <dd id="draft-unmapped-count">0</dd>
          </div>
        </dl>

        <p id="draft-source" class="source-line"></p>

        <div id="draft-fields" class="draft-fields" aria-label="草稿字段"></div>

        <section class="fill-handoff" aria-labelledby="fill-handoff-title">
          <h3 id="fill-handoff-title">准备填写豆瓣表单</h3>
          <p id="fill-readiness-message"></p>
          <button id="fill-handoff-button" class="secondary-button" type="button" disabled>
            生成填写交接摘要
          </button>
          <pre id="fill-payload-summary" hidden></pre>
        </section>

        <details id="draft-warnings" class="review-details">
          <summary>Warnings</summary>
          <ul id="draft-warning-list"></ul>
        </details>

        <details id="draft-unmapped" class="review-details">
          <summary>未映射数据</summary>
          <ul id="draft-unmapped-list"></ul>
        </details>
      </section>
    </main>

    <script type="module" src="./popup.js"></script>
  </body>
</html>
